name: CI

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typedb-setup:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        typedb_version: ["3.4.0", "latest"]
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    name: Run Action
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Action
        uses: ./
        with:
          typedb_version: ${{ matrix.typedb_version }}
          typedb_args: "--development-mode.enabled=true"

      - name: Retrieve TypeDB version
        run: curl --fail-with-body http://localhost:8000/v1/version
  test-without-fix:
    name: build and test ros_typedb pkg
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-jammy-latest
    steps:
      - uses: actions/checkout@v3.3.0
      - name: Run TypeDB
        uses: typedb/setup-typedb@1.0.0
        with:
          typedb_version: 3.8.1
      - name: run typedb
        run: sudo typedb server --development-mode.enabled=true &
  test-with-fix:
    name: build and test ros_typedb pkg
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-jammy-latest
    steps:
      - uses: actions/checkout@v3.3.0
      - name: Run TypeDB
        uses: ./
        with:
          typedb_version: 3.8.1
      - name: run typedb
        run: sudo typedb server --development-mode.enabled=true &
